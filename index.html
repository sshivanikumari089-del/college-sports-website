<!DOCTYPE html>
<html>
<head>
    <title>AthltiX</title>

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg,#0f2027,#2c5364,#00c6ff);
            overflow:hidden;
            font-family: Arial;
        }

        .container{
            text-align:center;
            color:white;
        }

        .title{
            font-size:65px;
            font-weight:bold;

            text-shadow:
                0 0 10px #fff,
                0 0 20px #00c6ff,
                0 0 40px #00c6ff;

            animation: glow 2s infinite alternate;
        }

        @keyframes glow{
            from{ opacity:0.7; }
            to{ opacity:1; }
        }

        .subtitle{
            font-size:22px;
            margin-top:10px;
            opacity:0.8;
        }

        .loader{
            margin-top:30px;
            width:200px;
            height:6px;
            background:#ffffff40;
            border-radius:10px;
            overflow:hidden;
            margin-left:auto;
            margin-right:auto;
        }

        .bar{
            height:100%;
            width:0%;
            background:#ff7a00;
            animation: load 5s linear forwards;
        }

        @keyframes load{
            from{ width:0%; }
            to{ width:100%; }
        }
    </style>

    <script>
        setTimeout(function(){
            window.location = "home.html";
        }, 5000);
    </script>
</head>

<body>

<div class="container">
    <div class="title">AthltiX</div>
    <div class="subtitle">Annual Sports Events</div>

    <!-- 🔥 Loading bar -->
    <div class="loader">
        <div class="bar"></div>
    </div>
</div>

</body>
</html>
